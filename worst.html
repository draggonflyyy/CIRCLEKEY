<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>worst - circlekey</title>
    <style>
        body { 
            background-color: black; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            position: relative;
            cursor: none !important; /* Pour la main perso */
        }

        /* CURSEUR MAIN */
        #custom-cursor {
            position: fixed;
            width: 80px;
            height: auto;
            pointer-events: none; 
            z-index: 1000;
            transform: translate(-10%, -40%);
            display: none;
        }

        .top-right-detail {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px; 
            height: auto;
            opacity: 1;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 5;
        }

        .serrure {
            max-width: 220px;
            height: auto;
            display: block;
        }

        audio { 
            filter: invert(100%); 
            width: 280px; 
        }

        .back-zone {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 80px;
            text-decoration: none;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 500;
        }

        .back-zone:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .back-img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 { 
            position: absolute; 
            bottom: 15px; 
            right: 20px; 
            font-family: Arial, sans-serif;
            font-size: 0.6rem;
            color: #FEFEFE; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin: 0;
        }
    </style>
</head>
<body>

    <img src="main.png" id="custom-cursor" alt="cursor">

    <img src="zzz.png" class="top-right-detail">

    <div class="content-container">
        <img src="serrure.jpg" class="serrure">
        <audio controls>
            <source src="worst.mp3" type="audio/mpeg">
        </audio>
    </div>

    <a href="index.html" class="back-zone">
        <img src="onecircle.png" class="back-img">
    </a>

    <h1>001</h1>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
        });
    </script>

</body>
</html>
