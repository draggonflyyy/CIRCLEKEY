<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Circle Key - Fast Spin Cascade</title>
    <style>
        body { 
            background-color: black; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
            cursor: none !important; 
        }

        /* CURSEUR MAIN */
        #custom-cursor {
            position: fixed;
            width: 80px;
            height: auto;
            pointer-events: none; 
            z-index: 1000;
            transform: translate(-10%, -40%);
            display: none;
        }

        /* FOND NOIR UNIQUEMENT */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1;
        }

        .container { 
            position: relative; 
            width: 1000px; 
            height: 667px; 
            z-index: 5;
        }

        img.main-key { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* BOUTON SECRET BLEU (Invisible au départ) */
        .secret-trigger {
            position: absolute;
            left: 40px;
            bottom: 40px;
            width: 50px;
            z-index: 100;
            opacity: 0; 
            transition: opacity 0.5s ease, transform 0.3s ease;
        }

        .secret-trigger:hover {
            opacity: 1; 
            transform: scale(1.1);
        }

        /* LETTRES EN MINUSCULES (selon ton Finder) */
        .lettre {
            position: absolute;
            width: 80px; 
            height: auto;
            z-index: 10;
            animation: fastSpinIn 3s linear forwards;
        }

        .c1 { top: 5%;  left: 5%;  animation-delay: 0.1s; }
        .i1 { top: 20%; left: 6%;  animation-delay: 0.3s; }
        .r1 { top: 35%; left: 4%;  animation-delay: 0.5s; }
        .c2 { top: 50%; left: 7%;  animation-delay: 0.7s; }
        .l1 { top: 65%; left: 5%;  animation-delay: 0.9s; }
        .e1 { top: 80%; left: 6%;  animation-delay: 1.1s; }

        .k1 { top: 15%; right: 5%; animation-delay: 1.3s; }
        .e2 { top: 40%; right: 6%; animation-delay: 1.5s; }
        .y1 { top: 65%; right: 5%; animation-delay: 1.7s; }

        @keyframes fastSpinIn {
            from { transform: rotate(-3600deg); }
            to { transform: rotate(0deg); }
        }
        
        /* ZONES DE CLIC INVISIBLES */
        .spot { 
            position: absolute; 
            border-radius: 50%; 
            z-index: 20; 
            background: rgba(255,255,255,0);
        }

        .s1 { top: 7%;  left: 5%;  width: 10%; height: 16%; }
        .s2 { top: 7%;  left: 17%; width: 10%; height: 16%; }
        .s3 { top: 7%;  left: 29%; width: 10%; height: 16%; }
        .s4 { top: 65%; left: 71%; width: 15%; height: 23%; }
        .s5 { top: 85%; left: 68%; width: 7%;  height: 10%; }
        .s6 { top: 61%; left: 86%; width: 10%; height: 15%; }
        .s7 { top: 78%; left: 88%; width: 7%;  height: 10%; }
        .s8 { top: 86%; left: 77%; width: 9%;  height: 12%; }
        .s9 { top: 87%; left: 88%; width: 7%;  height: 10%; }
    </style>
</head>
<body>

    <img src="main.png" id="custom-cursor" alt="cursor">

    <div class="background-overlay"></div>

    <a href="endcircle.html" class="secret-trigger">
        <img src="boutonsecret.png" alt="secret" style="width: 100%;">
    </a>

    <img src="c.png" class="lettre c1">
    <img src="i.png" class="lettre i1">
    <img src="r.png" class="lettre r1">
    <img src="c_2.png" class="lettre c2">
    <img src="l.png" class="lettre l1">
    <img src="e.png" class="lettre e1">
    <img src="k.png" class="lettre k1">
    <img src="e_2.png" class="lettre e2">
    <img src="y.png" class="lettre y1">

    <div class="container">
        <img src="circlekey.png" class="main-key">
        
        <a href="worst.html" class="spot s1"></a>
        <a href="kind.html" class="spot s2"></a>
        <a href="stupid.html" class="spot s3"></a>
        <a href="relief.html" class="spot s4"></a>
        <a href="time.html" class="spot s5"></a>
        <a href="underated.html" class="spot s6"></a>
        <a href="well.html" class="spot s7"></a>
        <a href="when.html" class="spot s8"></a>
        <a href="endcircle.html" class="spot s9"></a>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
        });
    </script>

</body>
</html>
