<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Archive - Minimal</title>
    <style>
        @font-face {
            font-family: 'Semilla';
            src: url('FlorDeRuina-Semilla.otf') format('opentype');
        }

        body {
            background-color: black;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Semilla', serif;
            cursor: none !important; 
        }

        #custom-cursor {
            position: fixed;
            width: 80px;
            height: auto;
            pointer-events: none; 
            z-index: 10000; 
            transform: translate(-10%, -40%); 
            display: none;
        }

        .main-controls {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10vw;
            z-index: 1;
        }

        .control-btn {
            width: 15vw; 
            max-width: 200px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .control-btn:hover { transform: scale(1.1); }

        .bye-bye {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-family: Arial, sans-serif;
            color: white;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: opacity 0.3s;
            z-index: 999; 
            pointer-events: auto !important;
        }
        
        .bye-bye:hover { opacity: 1; }

        .back-top {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #444;
            text-decoration: none;
            font-size: 14px;
            z-index: 999;
        }
        .back-top:hover { color: white; }

    </style>
</head>
<body>

    <img src="main.png" id="custom-cursor" alt="main cursor">

    <a href="index.html" class="back-top">EXIT</a>

    <audio id="secretAudio">
        <source src="secret.m4a" type="audio/mp4">
    </audio>

    <div class="main-controls">
        <img src="play.png" class="control-btn" onclick="playMusic()" alt="Play">
        <img src="stop.png" class="control-btn" onclick="stopMusic()" alt="Stop">
    </div>

    <a href="index.html" class="bye-bye">bye bye</a>

    <script>
        const cursor = document.getElementById('custom-cursor');
        var audio = document.getElementById('secretAudio');

        document.addEventListener('mousemove', e => {
            cursor.style.display = 'block';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
        });

        function playMusic() { 
            audio.play().catch(e => console.log("L'audio nécessite un clic utilisateur d'abord")); 
        }
        
        function stopMusic() { 
            audio.pause(); 
            audio.currentTime = 0; 
        }
    </script>
</body>
</html>
